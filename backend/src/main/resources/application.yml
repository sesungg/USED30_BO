spring:
  application:
    name: used30-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2

jwt:
  secret: used30-backoffice-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

server:
  port: 8080
  servlet:
    context-path: /api

cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:3000
